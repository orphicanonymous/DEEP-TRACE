<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
  <defs>
    <clipPath id="eye-clip-icon">
      <path d="M60 46 Q90 22 108 60 Q90 98 60 74 Q30 98 12 60 Q30 22 60 46Z"/>
    </clipPath>
    <style>
      @keyframes pulse-ring {
        0% { r: 30; opacity: 0.6; }
        100% { r: 54; opacity: 0; }
      }
      @keyframes pulse-ring2 {
        0% { r: 30; opacity: 0.4; }
        100% { r: 54; opacity: 0; }
      }
      @keyframes scan-line {
        0%   { y1: 30; y2: 30; opacity: 0.7; }
        100% { y1: 90; y2: 90; opacity: 0; }
      }
      @keyframes blink-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }
      @keyframes wave-move {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-20px); }
      }
      .pulse1 {
        animation: pulse-ring 2s ease-out infinite;
      }
      .pulse2 {
        animation: pulse-ring2 2s ease-out infinite;
        animation-delay: 0.8s;
      }
      .scan {
        animation: scan-line 2.5s ease-in-out infinite;
      }
      .blink {
        animation: blink-dot 1.5s ease-in-out infinite;
      }
      .wave-g {
        animation: wave-move 2s linear infinite;
      }
    </style>
  </defs>

  <!-- Dark background circle -->
  <circle cx="60" cy="60" r="58" fill="#0b1628"/>

  <!-- Animated pulse rings -->
  <circle cx="60" cy="60" r="30" fill="none" stroke="#3b82f6" stroke-width="1" class="pulse1"/>
  <circle cx="60" cy="60" r="30" fill="none" stroke="#60a5fa" stroke-width="0.8" class="pulse2"/>

  <!-- Static outer ring -->
  <ellipse cx="60" cy="60" rx="50" ry="29" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>

  <!-- Eye upper lid -->
  <path d="M12 60 Q36 22 60 16 Q84 22 108 60" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- Eye lower lid -->
  <path d="M12 60 Q36 98 60 104 Q84 98 108 60" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- Iris rings -->
  <circle cx="60" cy="60" r="22" fill="none" stroke="#2563eb" stroke-width="1.2"/>
  <circle cx="60" cy="60" r="15" fill="none" stroke="#3b82f6" stroke-width="0.8"/>
  <circle cx="60" cy="60" r="14" fill="#0f2444"/>

  <!-- Animated waveform inside eye -->
  <g clip-path="url(#eye-clip-icon)">
    <g class="wave-g">
      <path d="M10 60 q4-8 8 0 q4 8 8 0 q4-8 8 0 q4 8 8 0 q4-8 8 0 q4 8 8 0 q4-8 8 0 q4 8 8 0 q4-8 8 0 q4 8 8 0 q4-8 8 0 q4 8 8 0" fill="none" stroke="#60a5fa" stroke-width="1.1" opacity="0.6"/>
    </g>
  </g>

  <!-- Animated scan line -->
  <line x1="12" y1="40" x2="108" y2="40" stroke="#3b82f6" stroke-width="0.8" stroke-dasharray="5,4" opacity="0.6" class="scan"/>

  <!-- Pupil -->
  <circle cx="60" cy="60" r="6" fill="#1d4ed8"/>
  <circle cx="60" cy="60" r="2.8" fill="#93c5fd" class="blink"/>
  <circle cx="62.5" cy="57.5" r="1.2" fill="#dbeafe"/>

  <!-- Node dots -->
  <circle cx="60" cy="38" r="1.8" fill="#60a5fa" class="blink"/>
  <circle cx="60" cy="82" r="1.8" fill="#60a5fa"/>
  <circle cx="38" cy="60" r="1.5" fill="#3b82f6" opacity="0.7"/>
  <circle cx="82" cy="60" r="1.5" fill="#3b82f6" opacity="0.7"/>
</svg>
